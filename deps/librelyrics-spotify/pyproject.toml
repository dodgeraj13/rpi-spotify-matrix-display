[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "librelyrics-spotify"
version = "1.0.1"
description = "Spotify lyrics provider plugin for LibreLyrics"
readme = "README.md"
license = {text = "GPL-3.0-or-later"}
authors = [
    {name = "libre-lyrics", email = "libre-lyrics@users.noreply.github.com"}
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Sound/Audio",
]
keywords = ["lyrics", "spotify", "lrc", "synced-lyrics", "librelyrics", "plugin"]
requires-python = ">=3.9"

dependencies = [
    "librelyrics>=1.0.0",
    "requests>=2.28.0",
]

[project.urls]
Homepage = "https://github.com/libre-lyrics/librelyrics-spotify"
Repository = "https://github.com/libre-lyrics/librelyrics-spotify"
Issues = "https://github.com/libre-lyrics/librelyrics-spotify/issues"

[project.entry-points."librelyrics.plugins"]
spotify = "spotify:SpotifyModule"

[tool.setuptools]
packages = ["spotify"]
package-dir = {"spotify" = "."}
