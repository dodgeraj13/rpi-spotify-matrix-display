[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rpi-spotify-matrix-display"
version = "2.0.0"
description = "Raspberry Pi Spotify Matrix Display - Display Spotify album art on LED matrix"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.8"
dependencies = [
    "Pillow>=10.0.0",
    "numpy>=1.24.0",
    "requests>=2.31.0",
    "spotipy>=2.23.0",
    "RGBMatrixEmulator>=1.0.0",
]

[project.scripts]
spotify-matrix = "main:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["*.py"]
